<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Admin</title>
</head>
<body style="font-family:Arial;background:#111;color:white;padding:20px">

<h2>Admin Panel</h2>

<input id="name" placeholder="اسم المنتج"><br><br>
<input id="price" placeholder="السعر"><br><br>
<input id="img" placeholder="رابط الصورة"><br><br>
<input id="desc" placeholder="الوصف"><br><br>

<button onclick="addProduct()">إضافة</button>

<hr>

<div id="list"></div>

<script>

function getProducts(){
return JSON.parse(localStorage.getItem("products") || "[]");
}

function saveProducts(p){
localStorage.setItem("products", JSON.stringify(p));
}

function addProduct(){

let products = getProducts();

products.push({
name: document.getElementById("name").value || "بدون اسم",
price: document.getElementById("price").value || 0,
img: document.getElementById("img").value || "",
desc: document.getElementById("desc").value || ""
});

saveProducts(products);
render();
}

function deleteProduct(i){
let products = getProducts();
products.splice(i,1);
saveProducts(products);
render();
}

function render(){

let products = getProducts();
let html = "";

products.forEach((p,i)=>{
html += `
<div style="background:#222;padding:10px;margin:10px 0">
<h3>${p.name}</h3>
<p>${p.price} جنيه</p>
<button onclick="deleteProduct(${i})">حذف</button>
</div>
`;
});

document.getElementById("list").innerHTML = html;
}

render();

</script>

</body>
</html>
