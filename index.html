<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FRUZO AI | Ultra Fruit Store</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">

<style>

/* ================= GLOBAL ================= */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

body{
background:#050505;
color:white;
overflow-x:hidden;
}

body::before{
content:'';
position:fixed;
inset:0;
background:
radial-gradient(circle at top left,#ff4d6d22,transparent 30%),
radial-gradient(circle at bottom right,#00ffd522,transparent 30%),
linear-gradient(135deg,#0b0b0b,#000);
z-index:-1;
}

/* ================= HEADER ================= */

header{
padding:20px 6%;
display:flex;
justify-content:space-between;
align-items:center;
position:sticky;
top:0;
z-index:999;
background:#00000080;
backdrop-filter:blur(14px);
}

.logo{
font-size:30px;
font-weight:900;
background:linear-gradient(45deg,#ff5f7e,#ffd166,#00ffd5);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

/* ================= LAYOUT ================= */

.container{
display:grid;
grid-template-columns:1fr 420px;
gap:30px;
padding:40px;
}

/* ================= CARDS ================= */

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

.card{
background:rgba(255,255,255,.05);
border-radius:20px;
overflow:hidden;
border:1px solid rgba(255,255,255,.08);
}

.card img{
width:100%;
height:180px;
object-fit:cover;
}

.card-content{
padding:15px;
}

.price{
color:#ffd166;
font-weight:800;
}

button{
cursor:pointer;
}

/* ================= BUTTONS ================= */

.btn{
width:100%;
padding:12px;
border:none;
border-radius:12px;
font-weight:800;
margin-top:10px;
color:white;
}

.add{background:linear-gradient(45deg,#00ffd5,#00b4ff);}
.wrap{background:linear-gradient(45deg,#ff5f7e,#ff9966);}
.clear{background:#222;}

/* ================= ULTRA BOX ================= */

.stage{
perspective:1800px;
height:520px;
display:flex;
justify-content:center;
align-items:center;
}

.box{
width:360px;
height:360px;
position:relative;
transform-style:preserve-3d;
transform:rotateX(-18deg) rotateY(25deg);
transition:1s;
filter:drop-shadow(0 40px 60px rgba(0,0,0,.6));
}

.face{
position:absolute;
width:100%;
height:100%;
background:linear-gradient(145deg,#2c2c2c,#0f0f0f);
border:1px solid rgba(255,255,255,.08);
}

.front{transform:translateZ(60px);}
.back{transform:rotateY(180deg) translateZ(60px);}
.left{transform:rotateY(-90deg) translateZ(60px);}
.right{transform:rotateY(90deg) translateZ(60px);}
.bottom{transform:rotateX(90deg) translateZ(60px);}

.lid{
position:absolute;
width:100%;
height:100%;
background:linear-gradient(145deg,#444,#111);
transform:rotateX(90deg) translateZ(60px);
transform-origin:top;
transition:1s cubic-bezier(.2,.8,.2,1);
}

.box.open .lid{
transform:rotateX(175deg) translateZ(130px);
}

.box.open{
transform:rotateX(-8deg) rotateY(40deg) scale(1.1);
}

/* ================= FRUITS ================= */

#fruitLayer{
position:absolute;
inset:0;
z-index:5;
}

.fruit{
position:absolute;
width:60px;
height:60px;
object-fit:contain;
animation:drop .6s ease forwards;
}

@keyframes drop{
0%{transform:translateY(-120px) scale(.3);opacity:0;}
100%{transform:translateY(0) scale(1);opacity:1;}
}

/* ================= WRAP ================= */

.wrap-img{
position:absolute;
inset:0;
width:100%;
height:100%;
object-fit:contain;
z-index:10;
}

/* ================= PANEL ================= */

.panel{
background:rgba(255,255,255,.05);
padding:20px;
border-radius:20px;
backdrop-filter:blur(10px);
}

.total{
font-size:26px;
font-weight:900;
color:#ffd166;
margin-top:10px;
}

</style>

</head>

<body>

<header>
<div class="logo">FRUZO AI</div>
</header>

<div class="container">

<!-- LEFT SIDE -->
<div>

<h2>🍓 الفواكه</h2>

<div class="grid">

<div class="card">
<img src="https://images.unsplash.com/photo-1464965911861-746a04b4bca6">
<div class="card-content">
<h3>فراولة</h3>
<div class="price">45 جنيه</div>
<button class="btn add" onclick="addFruit('https://pngimg.com/d/strawberry_PNG2593.png',45)">إضافة</button>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1553279768-865429fa0078">
<div class="card-content">
<h3>مانجو</h3>
<div class="price">55 جنيه</div>
<button class="btn add" onclick="addFruit('https://pngimg.com/d/mango_PNG9168.png',55)">إضافة</button>
</div>
</div>

</div>

<h2 style="margin-top:30px;">🎁 التغليف</h2>

<button class="btn wrap" onclick="setWrap()">اختيار تغليف فاخر</button>

</div>

<!-- RIGHT SIDE (BOX) -->
<div class="panel">

<div class="stage">

<div class="box" id="box">

<div class="face front"></div>
<div class="face back"></div>
<div class="face left"></div>
<div class="face right"></div>
<div class="face bottom"></div>

<div class="lid"></div>

<div id="fruitLayer"></div>

<img id="wrapImage" class="wrap-img">

</div>

</div>

<div class="total" id="total">0 جنيه</div>

<button class="btn clear" onclick="clearAll()">مسح الكل</button>
<button class="btn wrap" onclick="unbox()">🎁 Unbox AI</button>

</div>

</div>

<script>

let total = 0;

function addFruit(img,price){

let f=document.createElement("img");
f.src=img;
f.className="fruit";

f.style.left=(120 + Math.random()*160)+"px";
f.style.top=(160 + Math.random()*160)+"px";

document.getElementById("fruitLayer").appendChild(f);

total += price;
update();

document.getElementById("box").classList.add("open");
}

function setWrap(){
document.getElementById("wrapImage").src =
"https://pngimg.com/d/gift_PNG5953.png";

total += 120;
update();
}

function update(){
document.getElementById("total").innerText = total + " جنيه";
}

function unbox(){
document.getElementById("box").classList.add("open");
alert("🎁 Ultra Unboxing Activated!");
}

function clearAll(){
document.getElementById("fruitLayer").innerHTML="";
document.getElementById("wrapImage").src="";
total=0;
update();
}

</script>

</body>
</html>
