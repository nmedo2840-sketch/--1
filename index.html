<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FRUZO AI | Unboxing Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

body{
background:#050505;
color:white;
overflow-x:hidden;
}

/* ===== HERO ===== */

.hero{
text-align:center;
padding:80px 20px;
}

.hero h1{
font-size:60px;
}

.gradient{
background:linear-gradient(45deg,#ff5f7e,#ffd166,#00ffd5);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

/* ===== BUILDER ===== */

.builder{
display:grid;
grid-template-columns:1fr 420px;
gap:30px;
padding:40px;
}

/* ===== 3D BOX ===== */

.preview-panel{
perspective:1400px;
position:sticky;
top:20px;
}

.box-preview{
height:520px;
display:flex;
justify-content:center;
align-items:center;
}

.box-3d{
width:380px;
height:380px;
position:relative;
transform-style:preserve-3d;
transform:rotateX(-18deg) rotateY(25deg);
animation:float 4s ease-in-out infinite;
transition:1s;
}

@keyframes float{
0%{transform:translateY(0) rotateX(-18deg) rotateY(25deg);}
50%{transform:translateY(-10px) rotateX(-18deg) rotateY(25deg);}
100%{transform:translateY(0) rotateX(-18deg) rotateY(25deg);}
}

/* ===== BOX FACES ===== */

.box-face{
position:absolute;
width:100%;
height:100%;
background:linear-gradient(145deg,#2a2a2a,#111);
border:1px solid rgba(255,255,255,.08);
box-shadow:inset 0 0 25px rgba(0,0,0,.6);
}

.front{transform:translateZ(60px);}
.back{transform:rotateY(180deg) translateZ(60px);}
.left{transform:rotateY(-90deg) translateZ(60px);}
.right{transform:rotateY(90deg) translateZ(60px);}
.bottom{
transform:rotateX(90deg) translateZ(60px);
background:#111;
}

/* ===== LID ===== */

.box-lid{
position:absolute;
width:100%;
height:100%;
background:linear-gradient(145deg,#3a3a3a,#111);
transform:rotateX(90deg) translateZ(60px);
transform-origin:top;
transition:0.9s cubic-bezier(.2,.8,.2,1);
}

.box-3d.open .box-lid{
transform:rotateX(170deg) translateZ(120px);
}

/* ===== FILL EFFECT ===== */

.box-3d.open{
transform:rotateX(-8deg) rotateY(35deg) scale(1.05);
}

/* ===== FRUITS ===== */

#fruitLayer{
position:absolute;
inset:0;
z-index:5;
}

.real-fruit{
position:absolute;
width:70px;
height:70px;
object-fit:contain;
animation:drop .6s ease forwards;
filter:drop-shadow(0 10px 10px rgba(0,0,0,.4));
}

@keyframes drop{
0%{
transform:translateY(-80px) scale(.3) rotate(-30deg);
opacity:0;
}
100%{
transform:translateY(0) scale(1) rotate(0);
opacity:1;
}
}

/* ===== WRAP ===== */

.wrap-image{
position:absolute;
inset:0;
width:100%;
height:100%;
object-fit:contain;
z-index:10;
pointer-events:none;
opacity:.95;
}

/* ===== PARTICLES ===== */

.particle{
position:absolute;
width:6px;
height:6px;
background:#ffd166;
border-radius:50%;
animation:floatUp 2s linear forwards;
opacity:.8;
}

@keyframes floatUp{
0%{transform:translateY(0);opacity:1;}
100%{transform:translateY(-120px);opacity:0;}
}

/* ===== BUTTONS ===== */

.ai-btn{
width:100%;
padding:16px;
border:none;
border-radius:14px;
font-weight:900;
background:linear-gradient(45deg,#ff5f7e,#ff9966);
color:white;
cursor:pointer;
margin-top:15px;
}

.clear{
width:100%;
padding:14px;
margin-top:10px;
background:#222;
color:white;
border:none;
border-radius:12px;
}

.total{
font-size:28px;
font-weight:900;
color:#ffd166;
margin-top:10px;
}

</style>

</head>

<body>

<div class="hero">
<h1>🍓 <span class="gradient">Unboxing Pro</span> Experience</h1>
</div>

<div class="builder">

<!-- PRODUCTS -->
<div>
<button class="ai-btn" onclick="addFruit('https://pngimg.com/d/strawberry_PNG2593.png','فراولة',45)">إضافة فراولة</button>
<button class="ai-btn" onclick="addFruit('https://pngimg.com/d/mango_PNG9168.png','مانجو',55)">إضافة مانجو</button>
<button class="ai-btn" onclick="setWrap()">اختيار تغليف</button>
</div>

<!-- BOX -->
<div class="preview-panel">

<div class="box-preview">

<div class="box-3d" id="box">

<div class="box-face front"></div>
<div class="box-face back"></div>
<div class="box-face left"></div>
<div class="box-face right"></div>
<div class="box-face bottom"></div>

<div class="box-lid"></div>

<div id="fruitLayer"></div>

<img class="wrap-image" id="wrapImage">

</div>

</div>

<div class="total" id="total">0 جنيه</div>

<button class="clear" onclick="clearAll()">مسح الكل</button>
<button class="ai-btn" onclick="unbox()">🎁 Unbox AI</button>

</div>

</div>

<script>

let total=0;
let opened=false;

function addFruit(img,name,price){

document.getElementById('box').classList.add('open');

for(let i=0;i<1;i++){

let f=document.createElement('img');
f.src=img;
f.className='real-fruit';

f.style.left=Math.random()*250+'px';
f.style.top=Math.random()*250+'px';

document.getElementById('fruitLayer').appendChild(f);

spawnParticles();

}

total+=price;
update();

}

function setWrap(){
document.getElementById('wrapImage').src=
'https://pngimg.com/d/gift_PNG5953.png';

total+=120;
update();
}

function update(){
document.getElementById('total').innerText=total+' جنيه';
}

function spawnParticles(){

for(let i=0;i<8;i++){

let p=document.createElement('div');
p.className='particle';
p.style.left=Math.random()*300+'px';
p.style.top=Math.random()*300+'px';

document.getElementById('fruitLayer').appendChild(p);

setTimeout(()=>p.remove(),2000);

}

}

function unbox(){

let box=document.getElementById('box');

box.classList.add('open');

setTimeout(()=>{
alert('🎁 Unboxing Completed!');
},1200);

}

function clearAll(){

document.getElementById('fruitLayer').innerHTML='';
document.getElementById('wrapImage').src='';
total=0;
update();

}

</script>

</body>
</html>
